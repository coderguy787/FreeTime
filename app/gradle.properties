# ========== Android Configuration ==========
# WebRTC Version - Use the version from root build.gradle (107.2.24)
# This property is no longer needed here as it's inherited from root

# ========== Important Notes ==========
# 1. Change SERVER_HOST and PEER_HOST to match your master-server address
# 2. Ensure firewall allows connections to ports: 80, 8080, 9080, 3001
# 3. For production, use HTTPS (requires SSL certificate on server)
# 4. Monthly limits are reset on the 1st of each month UTC
# 5. For local development, use: 192.168.1.100 (or your local IP)
# 6. For remote development, use: example.com (or your domain)
#
# Dev flavor overrides (for local development with emulator or local server):
# DEV_SERVER_HOST=10.0.2.2
# DEV_SERVER_PORT=8000
# DEV_SERVER_SCHEME=http
