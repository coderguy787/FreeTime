services:
  # MongoDB Database
  mongodb:
    image: mongo:6.0-alpine
    container_name: securechat-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: securechat
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
      - ./database/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - securechat-network
    command: mongod --auth --logpath /dev/stdout

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: securechat-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - securechat-network
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}

  # Master Server
  master-server:
    build:
      context: ./master-server
      dockerfile: Dockerfile
    container_name: securechat-master-server
    restart: unless-stopped
    ports:
      - "443:443"     # API (HTTPS)
      - "8080:8080"   # WebSocket (WSS)
      - "9080:9080"   # Peer Network (WSS)
      - "3001:3001"   # Admin Panel
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT_API: 443
      PORT_WEBSOCKET: 8080
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ENABLE_FILE_LOGGING: "true"
      LOG_DIR: /app/logs
      MONGODB_URI: mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-changeme}@mongodb:27017/securechat?authSource=admin
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      JWT_EXPIRY: ${JWT_EXPIRY:-24h}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://securechat.app}
      MAX_CONNECTIONS_PER_USER: ${MAX_CONNECTIONS_PER_USER:-5}
      REQUEST_TIMEOUT_MS: ${REQUEST_TIMEOUT_MS:-30000}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD", "curl", "-fk", "https://localhost:443/health/live"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    networks:
      - securechat-network

  # Prometheus Monitoring (Optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: securechat-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    environment:
      - STORAGE_TSDB_RETENTION_TIME=30d
    networks:
      - securechat-network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  # Grafana Dashboard (Optional)
  grafana:
    image: grafana/grafana:latest
    container_name: securechat-grafana
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - securechat-network
    depends_on:
      - prometheus

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  securechat-network:
    driver: bridge
